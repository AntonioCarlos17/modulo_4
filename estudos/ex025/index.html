<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos com iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px dashed gray;
            scrollbar-color: black ;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <!-- o tamanho do iframe por padrão é 300px de largura e 150px de altura -->
    <h1>Testando o uso do iframe</h1>
    <p>acesse o site o <iframe src="https://www.cursoemvideo.com" frameborder="1"> <a href="https://www.cursoemvideo.com" target="_blank" scolling="no"> Cursoemvideo</a> </iframe> para aprender a programar.</p>
    <p>Acesse o <iframe src="https://paletton.com" frameborder="1">
        <a href="https://paletton.com" target="_blank" scolling="yes">Palleton</a>
    </iframe> para pesquisar sobre as cores.</p>
</body>
</html>
