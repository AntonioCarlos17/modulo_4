<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="post">
        <fieldset>
            <legend>Sexo</legend>
            <!--Nos botões de radio precisam ter o mesmo name para poder funcionar corretamente -->
            <input type="radio" name="Sexo" id="masc" value="Masculino"><label for="masc"> Masculino</label> <br>
            <input type="radio" name="Sexo" id="fem" value="Feminino"><label for="fem"> Feminino</label> <br>
        </fieldset>
        <fieldset>
            <legend>Esportes Favoritos</legend>
            <p>
                <input type="checkbox" name="ifut" id="ifut" value="Futebol"><label for="ifut"> Futebol</label> <br>
                <input type="checkbox" name="ibas" id="ibas" value="Basquete"><label for="ibas"> Basquete</label> <br>
                <input type="checkbox" name="inat" id="inat" value="Natacao"><label for="inat"> Natação</label> <br>
                <input type="checkbox" name="iten" id="iten" value="Tenis"><label for="iten"> Tênis</label> <br>
            </p>
            </fieldset>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        
    </form>
</body>
</html>
