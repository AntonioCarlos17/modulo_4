<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    
    <form action="cadastro.php" method="get">
    <fieldset>
        <legend>Dados Pessoais</legend>
    <p>
        <label for="inome">Nome:</label>
        <input type="text" name="inome" id="inome" minlength="5" maxlength="50" required>
    </p>
    <p>
        <label for="iemail">Email:</label>
        <input type="email" id="iemail" name="iemail" required>
    </p>
    <p>
        <label for="itel">Telefone:</label>
        <input type="tel" id="itel" name="itel" autocomplete="mobile" required pattern="[0-9]{2} [0-9]{5}-[0-9]{4}" title="Digite o telefone no formato: 99 99999-9999" placeholder="(xx) xxxxx-xxxx">
    </p>
    <!--Estudar mais sobre RegEx-->
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
    </fieldset>
    </form>
</body>
</html>
